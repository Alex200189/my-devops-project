name: Artifacts Practice

on:
  push:
    branches: [ main ]

jobs:
  build-and-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Build Asset
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          echo "Build date: $(date)" > dist/build_info.txt

      # ШАГ ПРАКТИКИ: Сохранение артефакта
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-package # Название архива
          path: dist/        # Какую папку сохранить
          retention-days: 5  # Сколько дней хранить (необязательно)

